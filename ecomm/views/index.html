<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopRush - Your Shopping Destination</title>
    <link rel="stylesheet" href="/JS/CSS/style.css">
</head>
<body>
    <header class="header">
        <div class="nav-container">
            <a href="#" class="logo" onclick="showPage('home')"> ShopRush</a>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search Products...." onkeydown="if(event.key==='Enter') searchProducts()">
                <button onclick="searchProducts()">search</button>
            </div>
<div class="nav-actions">
<a href="#" class="nav-btn" id="accountBtn" onclick="handleAccountClick()">👤Account</a>
<a href="#" class="nav-btn" onclick="showPage('cart')">🛒Cart(<span id="cartCount">0</span>)</a>
<a href="#" class="nav-btn" onclick="showPage('orders')">📦Orders</a>
</div>
        </div>
    </header>
    <main class="main-content">

    <div id="homePage" class="page">

        <section class="hero">
            <div class="hero-content">
                <h1>Welcome to ShopRush</h1>
                <p>
                    Discover amazing products at unbeatable prices
                </p>

                <a href="#categories" class="hero-btn">Shop Now</a>
            </div>
        </section>

        <section class="categories" id="categories">
            <div class="container">

                <h2>Shop by Category</h2>

                <div class="category-grid" id="categoryGrid">
                    <!-- Categories will be populated here -->
                </div>

            </div>
        </section>

    </div>
    <div id="categoryPage" class="page hidden">
    <div class="container">
        <h1 id="categoryTitle">
            Products
        </h1>

        <div class="filter-section">
            <div class="filter-row">

                <div class="filter-group">
                    <label for="sortBy">Sort By:</label>
                    <select id="sortBy" onchange="applyFilters()">
                        <option value="relevance">Relevance</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="rating">Rating</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="priceRange">Max Price:</label>
                    <input
                        type="range"
                        id="priceRange"
                        min="0"
                        max="10000"
                        value="10000" onchange="applyFilters()"
                    >
                    <span id="priceValue">10000</span>
                </div>
<div class="filter-group">
    <label for="brandFilter">Brand:</label>
    <select id="brandFilter" onchange="applyFilters()">
        <option value="">All Brands</option>
    </select>
</div>
            </div>
        </div>
        <div class="product-grid" id="productGrid"></div>
    </div>
    </div>
    <div id="productPage" class="page hidden">
        <div class="container">
            <div class="product-detail" id="productDetail">
                
            </div>
        </div>
    </div>
    <div id="cartPage" class="page hidden">
    <div class="container">
        <h1>
            My Cart
        </h1>

        <div id="cartItems">

        </div>

        <div class="cart-summary"
             id="cartSummary">

        </div>
    </div>
</div>
<div id="orderPage" class="page hidden">
    <div class="container">
        <h1>
            Place Order
        </h1>
        <div id="orderSteps">

        </div>
    </div>
</div>
<div id="ordersPage" class="page hidden">
    <div class="container">
        <h1>
            My Orders
        </h1>
        <div id="ordersList">

        </div>

    </div>

</div>

<div id="loginRegisterPage" class="page hidden">
    <div class="container">
        <div id="loginFormContainer" class="auth-form">
            <h2>Login</h2>
            <div id="loginError" class="error-message" style="display:none"></div>
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" onkeydown="if(event.key==='Enter') login()">
            </div>
            <button class="btn-primary" onclick="login()">Login</button>
            <p class="form-link">Don't have an account? <a href="#" onclick="toggleAuthForm('register')">Register</a></p>
        </div>
        <div id="registerFormContainer" class="auth-form" style="display:none">
            <h2>Create Account</h2>
            <div id="registerError" class="error-message" style="display:none"></div>
            <div class="form-group">
                <label for="registerName">Name</label>
                <input type="text" id="registerName" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label for="registerEmail">Email</label>
                <input type="email" id="registerEmail" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="registerPassword">Password</label>
                <input type="password" id="registerPassword" placeholder="Min 6 characters" onkeydown="if(event.key==='Enter') register()">
            </div>
            <button class="btn-primary" onclick="register()">Create Account</button>
            <p class="form-link">Already have an account? <a href="#" onclick="toggleAuthForm('login')">Login</a></p>
        </div>
    </div>
</div>

<div id="accountPage" class="page hidden">
    <div class="container">
        <div class="account-form" id="accountContent">
        </div>
    </div>
</div>

</main>
<script src="/api.js"></script>
<script src="/JS/script.js"></script>
</body>
</html>
